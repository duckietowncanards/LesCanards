<!DOCTYPE html>
<html>

<head>
    <title>Duckiebot Control + Camera</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="wrapper">

        <div id="big-title">
          Les Canards Control
        </div>
      <button class="control-button run"    onclick="send('start')">  Run </button>
      <button class="control-button stop"   onclick="send('stop')">   Stop </button>
      <button class="control-button reset"  onclick="send('reset')">  Reset </button>

    <div class = "camera">
        <img id="cam">
      <div id="cam-title">
          See through my eyes:
        </div>
    </div>

      <div class="controller-container1">
        <div class="controller-panel1">
          <div class="controller-title">Control parameters</div>
          <div class="controller-grid">
            <span class="controller-head">action</span>
            <span class="controller-head">k_tangent</span>
            <span class="controller-head">k_offset</span>

            <span class="controller-action">default</span>
            <input type="number" id="k_tangent_default"  value="2.8" step="0.1">
            <input type="number" id="kc_default"  value="0.6" step="0.1">

            <span class="controller-action">left</span>
            <input type="number" id="k_tangent_left"  value="2.7" step="0.1">
            <input type="number" id="kc_left"  value="0.1" step="0.1">

            <span class="controller-action">straight</span>
            <input type="number" id="k_tangent_straight"  value="2.5" step="0.1">
            <input type="number" id="kc_straight"  value="1.0" step="0.1">

            <span class="controller-action">right</span>
            <input type="number" id="k_tangent_right"  value="2.8" step="0.1">
            <input type="number" id="kc_right"  value="0.1" step="0.1">
          </div>
          <button class="controller-apply" onclick="applyPidActions()">Apply</button>
        </div>

        <div class="controller-panel1">
          <div class="controller-title">Velocity</div>
          <label class="controller-vscale">velocity <input type="number" id="velocity" value="0.2" step="0.01"></label>
          <button class="controller-apply" onclick="applyVScale()">Apply</button>
        </div>
      </div>

      <img class="french" src="/static/images/frenchduck.png">

      <div class="map-container">
        <div id="map"></div>

        <div id="map-title">
          Where should I go?
        </div>
      </div>

      <div class="carla-row">
        <div id="carla-title">
          Where I plan to drive:
        </div>

        <div class="carla1">
          <img id="bev">
        </div>

        <div class="carla2">
          <img id="traj">
        </div>
      </div>

      <script src="/static/js/script.js"></script>
    </div>
</body>
</html>
